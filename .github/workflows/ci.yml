name: QA & Deployment Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened, closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write
  statuses: write
  pages: write
  id-token: write

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Avoidance Check
        run: npm run check:avoidance

      - name: Run Unit Tests
        run: npm run test:unit -- --coverage

      - name: Enforce Coverage Thresholds
        run: |
          node -e '
            const fs = require("fs");
            const coverage = JSON.parse(fs.readFileSync("coverage/coverage-summary.json", "utf8"));
            const thresholds = { branches: 85, functions: 85, lines: 80, statements: 80 };
            let failed = false;
            for (const [metric, threshold] of Object.entries(thresholds)) {
              if (coverage.total[metric].pct < threshold) {
                console.error(`❌ Coverage for ${metric} (${coverage.total[metric].pct}%) is below the threshold of ${threshold}%`);
                failed = true;
              } else {
                console.log(`✅ Coverage for ${metric} (${coverage.total[metric].pct}%) meets the threshold of ${threshold}%`);
              }
            }
            if (failed) process.exit(1);
          '


      - name: Generate Coverage Summary
        if: always()
        run: node scripts/coverage-summary.js

      - name: Build Application
        run: npm run build
        env:
          VITE_FORMSPREE_ID: ${{ secrets.VITE_FORMSPREE_ID }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}

      - name: Generate Bundle Summary
        if: success()
        run: node scripts/bundle-summary.js

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  test-e2e:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Run E2E Tests (Shard ${{ matrix.shard }}/4)
        run: npx playwright test --shard=${{ matrix.shard }}/4

      - name: Generate Playwright Summary
        if: always()
        run: node scripts/playwright-summary.js
        env:
          PLAYWRIGHT_SHARD: ${{ matrix.shard }}

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 30

  test-e2e-status:
    name: "🎭 E2E Tests Summary"
    needs: test-e2e
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Shard Results
        if: needs.test-e2e.result != 'success'
        run: |
          echo "❌ Einige Playwright Shards sind fehlgeschlagen."
          exit 1
      - name: Success
        run: echo "✅ Alle Playwright Shards erfolgreich abgeschlossen."

  lighthouse-mobile:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Lighthouse CI CLI
        run: npm install -g @lhci/cli@0.13.0

      - name: Run Lighthouse CI (Mobile)
        run: |
          lhci autorun \
            --collect.startServerCommand="python3 -m http.server 4173 --directory dist" \
            --collect.startServerReadyPattern="Serving HTTP" \
            --collect.settings.emulatedFormFactor=mobile \
            --upload.githubStatusContextSuffix="-mobile"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN || secrets.GITHUB_TOKEN }}
          VITE_CI_MODE: "true"

      - name: Generate Mobile Summary
        if: always()
        run: |
          mkdir -p lighthouse-mobile
          cp -r .lighthouseci/* lighthouse-mobile/ || true
          LHCI_TITLE="Lighthouse Mobile Audit" node scripts/lighthouse-summary.js

      - name: Upload Mobile Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports-mobile
          path: lighthouse-mobile/
          retention-days: 30

  lighthouse-desktop:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Lighthouse CI CLI
        run: npm install -g @lhci/cli@0.13.0

      - name: Run Lighthouse CI (Desktop)
        run: |
          lhci autorun \
            --collect.startServerCommand="python3 -m http.server 4173 --directory dist" \
            --collect.startServerReadyPattern="Serving HTTP" \
            --collect.settings.preset=desktop \
            --upload.githubStatusContextSuffix="-desktop"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN || secrets.GITHUB_TOKEN }}
          VITE_CI_MODE: "true"

      - name: Generate Desktop Summary
        if: always()
        run: |
          mkdir -p lighthouse-desktop
          cp -r .lighthouseci/* lighthouse-desktop/ || true
          LHCI_TITLE="Lighthouse Desktop Audit" node scripts/lighthouse-summary.js

      - name: Upload Desktop Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports-desktop
          path: lighthouse-desktop/
          retention-days: 30




  deploy:
    needs: [build, test-e2e-status, lighthouse-mobile, lighthouse-desktop]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Deploy to GitHub Pages Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          keep_files: true

  pr-preview:
    needs: [build, test-e2e-status, lighthouse-mobile, lighthouse-desktop]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: pr-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto

  pr-preview-cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: pr-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Remove PR Preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: remove
