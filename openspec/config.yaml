schema: spec-driven

context: |
  Tech Stack: Vue.js 3, TypeScript, Vite, Tailwind CSS.
  Linting/Formatting: Biome.
  Testing: Vitest (Unit/Component), Playwright (E2E).
  CI/CD: GitHub Actions.
  Domain: Premium personal developer portfolio.
  Design System: Custom bento-box grid with a unique Dark/Light "Finished/Blueprint" theme toggle.

  Strict Conventions: 
  - Vue: EXCLUSIVELY use Vue 3 Composition API with `<script setup>` syntax. Do NOT use the Options API.
  - Vue: Component names must be multi-word (e.g., `BentoCard.vue`, `ThemeToggle.vue`).
  - TypeScript: Strict typing is mandatory. Absolutely no use of `any`. Define interfaces for all component props and state.
  - CSS/Styling: Use Tailwind CSS for utility classes, but rely on robust CSS variables (Custom Properties) for the global theme switching logic.
  - Formatting: All files MUST adhere to Biome formatting rules (enforced via CI).
  - Performance: Event Management SHALL be centralized. Components MUST NOT add local scroll or resize listeners to the window. Use the `useViewportStore` coordinator.
  - Maintenance: Visual patterns requiring layer duplication (Blueprint/Finished) MUST use the `<FusedReveal>` abstraction to ensure DRY templates.
  - Data: All static content (Projects, Skills, etc.) SHALL be externalized into `src/data/` to keep component templates clean and data-driven.
  - Architecture: Components SHALL be organized by feature domain (e.g., `src/components/features/`, `src/components/navigation/`).

rules:
  proposal:
    - Clearly outline the state management strategy for the global theme toggle.
    - Detail the component hierarchy and reusability (e.g., generic Bento components).
    - Always include a "Non-goals" section to prevent scope creep.
    - Define a testing strategy for the proposed feature (Unit vs E2E).
  specs:
    - Include requirement scenarios for visual state transitions (e.g. Phase changes).
  tasks:
    - Break tasks down by specific Vue components.
    - Always include a preliminary step for defining TypeScript interfaces/types before writing the template logic.
    - Include explicit tasks for adding Unit and/or E2E tests for new logic/flows.
    - E2E tests must follow the Page Object Model (POM) pattern.
    - "PRE-FLIGHT: Before generating or modifying any code for a task, the agent MUST read and apply all guidelines located in the `.docs/skills/` directory."
    - "POST-FLIGHT / DEFINITION OF DONE: Before marking any task as complete, the agent MUST execute the following commands and autonomously fix any resulting errors:"
    - "1. Run Biome linter/formatter (e.g., `npm run lint`, `npm run format` or `biome check .`)."
    - "2. Run Vitest unit/component tests (e.g., `npm run test:unit`)."
    - "3. Run Playwright E2E tests if UI flows were affected (e.g., `npm run test:e2e`)."
